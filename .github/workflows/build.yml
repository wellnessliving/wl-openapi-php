name: Build PHP SDK

on:
  repository_dispatch:
    types: [openapi-updated]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'composer.json'

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout OpenAPI spec
        uses: actions/checkout@v4
        with:
          repository: wellnessliving/openapi
          path: openapi-spec

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate stable SDK
        run: php scripts/generate.php stable

      - name: Generate dev SDK
        run: php scripts/generate.php dev

      - name: Generate production SDK
        run: php scripts/generate.php production

      - name: Check syntax
        run: |
          ERRORS=$(find scripts stable/src dev/src src -name '*.php' -print0 2>/dev/null \
            | xargs -0 -P4 php -l 2>&1 \
            | grep -v "No syntax errors" || true)
          [ -z "$ERRORS" ] || { printf '%s\n' "$ERRORS"; exit 1; }
          echo "All PHP files are syntactically valid."

      - name: Format generated PHP
        run: vendor/bin/php-cs-fixer fix

      - name: Detect production changes
        id: changes
        run: |
          test -d src && git add -A src/ || true
          git diff --staged --quiet || echo "prod_changed=true" >> "$GITHUB_OUTPUT"

          STABLE_VER=$(php -r "require 'stable/src/WlSdkInfo.php'; echo \WlSdk\WlSdkInfo::SPEC_VERSION;" 2>/dev/null || echo "unknown")
          DEV_VER=$(php -r "require 'dev/src/WlSdkInfo.php'; echo \WlSdk\WlSdkInfo::SPEC_VERSION;" 2>/dev/null || echo "unknown")
          PROD_VER=$(php -r "require 'src/WlSdkInfo.php'; echo \WlSdk\WlSdkInfo::SPEC_VERSION;" 2>/dev/null || echo "pending")
          echo "stable_ver=${STABLE_VER}" >> "$GITHUB_OUTPUT"
          echo "dev_ver=${DEV_VER}"       >> "$GITHUB_OUTPUT"
          echo "prod_ver=${PROD_VER}"     >> "$GITHUB_OUTPUT"

      - name: Commit production to main
        if: steps.changes.outputs.prod_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG=$(printf 'chore: regenerate SDK from OpenAPI spec\n\nstable: %s\ndev: %s\nproduction: %s' \
            "${{ steps.changes.outputs.stable_ver }}" \
            "${{ steps.changes.outputs.dev_ver }}" \
            "${{ steps.changes.outputs.prod_ver }}")
          git commit -m "$MSG"
          git stash
          git pull --rebase origin main
          git push
          git stash pop

      - name: Update channel branches
        id: channel_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          push_channel() {
            local CHANNEL=$1 VERSION=$2 PKG_NAME=$3

            if [ ! -d "${CHANNEL}/src" ]; then
              echo "  ${CHANNEL}: no src directory yet, skipping."
              return 0
            fi

            local BRANCH="${CHANNEL}"
            local WT="${RUNNER_TEMP}/wt-${CHANNEL}"

            echo "  Checking ${BRANCH}..."

            git fetch origin "refs/heads/${BRANCH}:refs/heads/${BRANCH}" 2>/dev/null || true

            if git show-ref --verify --quiet "refs/heads/${BRANCH}"; then
              git worktree add "${WT}" "${BRANCH}"
            else
              git worktree add --orphan -b "${BRANCH}" "${WT}"
            fi

            git -C "${WT}" rm -rf . --ignore-unmatch -q
            cp -r "${CHANNEL}/src" "${WT}/src"
            sed -e "s|{{PACKAGE_NAME}}|${PKG_NAME}|" \
                -e "s|{{CHANNEL}}|${CHANNEL}|" \
                -e "s|{{VERSION}}|${VERSION}|" \
                scripts/templates/channel-composer.json.tpl > "${WT}/composer.json"

            git -C "${WT}" add -A

            if git -C "${WT}" diff --staged --quiet; then
              echo "  ${CHANNEL}: no changes."
            else
              git -C "${WT}" commit -m "${CHANNEL}: ${VERSION}"
              git -C "${WT}" push origin "${BRANCH}" --force
              echo "${CHANNEL}_pushed=true" >> "$GITHUB_OUTPUT"
              echo "  ${CHANNEL}: pushed."
            fi

            git worktree remove "${WT}" --force
          }

          push_channel "stable" "${{ steps.changes.outputs.stable_ver }}" "wellnessliving/wl-openapi-php-stable"
          push_channel "dev"    "${{ steps.changes.outputs.dev_ver }}"    "wellnessliving/wl-openapi-php-dev"

      - name: Package stable archive
        if: steps.channel_push.outputs.stable_pushed == 'true'
        run: cd stable && zip -r ../wl-openapi-php.zip src/

      - name: Release stable
        if: steps.channel_push.outputs.stable_pushed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-${{ steps.changes.outputs.stable_ver }}
          name: stable ${{ steps.changes.outputs.stable_ver }}
          body: |
            ## WellnessLiving PHP SDK - stable channel

            Spec version: `${{ steps.changes.outputs.stable_ver }}`
            Branch: [`stable`](https://github.com/wellnessliving/wl-openapi-php/tree/stable)

            ### Install

            ```bash
            # Add source once (per project)
            composer config repositories.wl-sdk vcs https://github.com/wellnessliving/wl-openapi-php

            composer require wellnessliving/wl-openapi-php-stable
            ```
          prerelease: true
          files: wl-openapi-php.zip
          fail_on_unmatched_files: false
          make_latest: false

      - name: Package dev archive
        if: steps.channel_push.outputs.dev_pushed == 'true'
        run: cd dev && zip -r ../wl-openapi-php.zip src/

      - name: Release dev
        if: steps.channel_push.outputs.dev_pushed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.changes.outputs.dev_ver }}
          name: dev ${{ steps.changes.outputs.dev_ver }}
          body: |
            ## WellnessLiving PHP SDK - dev channel

            Spec version: `${{ steps.changes.outputs.dev_ver }}`
            Branch: [`dev`](https://github.com/wellnessliving/wl-openapi-php/tree/dev)

            > **Pre-release.** Built from the dev OpenAPI spec - may contain breaking changes.

            ### Install

            ```bash
            # Add source once (per project)
            composer config repositories.wl-sdk vcs https://github.com/wellnessliving/wl-openapi-php

            composer require wellnessliving/wl-openapi-php-dev
            ```
          files: wl-openapi-php.zip
          fail_on_unmatched_files: false
          make_latest: false

      - name: Package production archive
        if: steps.changes.outputs.prod_changed == 'true'
        run: zip -r wl-openapi-php.zip src/

      - name: Release production
        if: steps.changes.outputs.prod_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: production-${{ steps.changes.outputs.prod_ver }}
          name: production ${{ steps.changes.outputs.prod_ver }}
          body: |
            ## WellnessLiving PHP SDK - production channel

            Spec version: `${{ steps.changes.outputs.prod_ver }}`
            Branch: [`main`](https://github.com/wellnessliving/wl-openapi-php)

            ### Install

            ```bash
            # Add source once (per project)
            composer config repositories.wl-sdk vcs https://github.com/wellnessliving/wl-openapi-php

            composer require wellnessliving/wl-openapi-php
            ```
          files: wl-openapi-php.zip
          fail_on_unmatched_files: false
          make_latest: true