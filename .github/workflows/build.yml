name: Build PHP SDK

on:
  repository_dispatch:
    types: [openapi-updated]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'composer.json'

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate stable SDK
        run: php scripts/generate.php stable

      - name: Generate dev SDK
        run: php scripts/generate.php dev

      - name: Detect changes
        id: changes
        run: |
          git diff --quiet stable/src/ dev/src/ || echo "changed=true" >> "$GITHUB_OUTPUT"
          STABLE_VER=$(php -r "require 'stable/src/WlSdkInfo.php'; echo \WlSdk\WlSdkInfo::SPEC_VERSION;" 2>/dev/null || echo "unknown")
          DEV_VER=$(php -r "require 'dev/src/WlSdkInfo.php'; echo \WlSdk\WlSdkInfo::SPEC_VERSION;" 2>/dev/null || echo "unknown")
          echo "stable_version=${STABLE_VER}" >> "$GITHUB_OUTPUT"
          echo "dev_version=${DEV_VER}" >> "$GITHUB_OUTPUT"

      - name: Commit updated SDK files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable/src/ dev/src/
          git commit -m "chore: regenerate PHP SDK

          stable: ${{ steps.changes.outputs.stable_version }}
          dev:    ${{ steps.changes.outputs.dev_version }}"
          git push

      - name: Create GitHub release
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changes.outputs.stable_version }}
          name: PHP SDK ${{ steps.changes.outputs.stable_version }}
          body: |
            ## WellnessLiving PHP SDK

            | Channel | Spec version |
            |---------|-------------|
            | stable  | `${{ steps.changes.outputs.stable_version }}` |
            | dev     | `${{ steps.changes.outputs.dev_version }}` |

            ### Usage

            ```php
            use WlSdk\WlSdkClient;
            use WlSdk\Core\Request\ExampleApi;

            $client = new WlSdkClient(['token' => 'YOUR_JWT_TOKEN']);

            $api = new ExampleApi($client);
            $api->i_argument = 1;
            $result = $api->get();
            ```

            ### Install

            ```bash
            composer require wellnessliving/wl-sdk-php
            ```
          make_latest: true
